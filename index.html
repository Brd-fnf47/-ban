<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBAN Bilgilerim</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:90%;
    max-width:450px;
    background:#fff;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

h1{
    color:#1e3a8a;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
    margin-top:15px;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.label{
    font-weight:bold;
    margin-top:15px;
    color:#555;
}

.value{
    font-size:20px;
    margin-top:5px;
    word-break:break-word;
}

#mesaj{
    margin-top:15px;
    color:red;
}

#ibanSayfa{
    display:none;
}
</style>
</head>
<body>

<div class="card" id="giris">
    <h1>Giriş</h1>
    <p>Devam etmek için şifreyi giriniz.</p>

    <input type="password" id="sifre" placeholder="Şifre">

    <button onclick="kontrol()">Giriş Yap</button>

    <div id="mesaj"></div>
</div>

<div class="card" id="ibanSayfa">
    <h1>Banka Bilgileri</h1>

    <div class="label">Ad Soyad</div>
    <div class="value">Mehmet Çakar</div>

    <div class="label">IBAN</div>
    <div class="value" id="iban">TR86000100901093719005001</div>

    <button onclick="kopyala()">IBAN'ı Kopyala</button>

    <div id="kopyaMesaj" style="margin-top:15px;color:green;"></div>
</div>

<script>
const DOGRU_SIFRE = "606_f";

function kontrol(){
    const sifre = document.getElementById("sifre").value;

    if(sifre === DOGRU_SIFRE){
        document.getElementById("giris").style.display="none";
        document.getElementById("ibanSayfa").style.display="block";
    }else{
        document.getElementById("mesaj").innerText="❌ Şifre hatalı!";
    }
}

document.getElementById("sifre").addEventListener("keypress", function(e){
    if(e.key==="Enter"){
        kontrol();
    }
});

function kopyala(){
    navigator.clipboard.writeText(document.getElementById("iban").innerText);
    document.getElementById("kopyaMesaj").innerText="✅ IBAN kopyalandı.";
}
</script>

</body>
</html>
