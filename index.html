<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBAN Bilgilerim</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:90%;
    max-width:450px;
    background:white;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

h1{
    color:#1e3a8a;
    margin-bottom:20px;
}

.info{
    margin:20px 0;
}

.label{
    font-weight:bold;
    color:#555;
    margin-bottom:5px;
}

.value{
    font-size:20px;
    color:#111;
    word-break:break-word;
}

button{
    margin-top:25px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1d4ed8;
}

#mesaj{
    margin-top:15px;
    color:green;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="card">
    <h1>Banka Bilgileri</h1>

    <div class="info">
        <div class="label">Ad Soyad</div>
        <div class="value">Mehmet Çakar</div>
    </div>

    <div class="info">
        <div class="label">IBAN</div>
        <div class="value" id="iban">TR86000100901093719005001</div>
    </div>

    <button onclick="kopyala()">IBAN'ı Kopyala</button>

    <div id="mesaj"></div>
</div>

<script>
function kopyala(){
    const iban=document.getElementById("iban").innerText;

    navigator.clipboard.writeText(iban).then(()=>{
        document.getElementById("mesaj").innerText="✅ IBAN kopyalandı.";
    });
}
</script>

</body>
</html>
